<!DOCTYPE html>
<html>
  <head></head>
  <body>

    <button onclick="
      playGame('heads');
      ">Heads</button>

    <button onclick="
      playGame('tails');
    ">Tails</button>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      localStorage.setItem('score', JSON.stringify(score));
      alert(`Score has been reset. \nWins: ${score.wins}, Losses: ${score.losses}`);
    ">Reset Score</button>

    <script>

      let score = JSON.parse(localStorage.getItem('score')) || {
          wins: 0,
          losses: 0
      };

      function playGame(guess) {
        const randomNumber = Math.random();
        const result = randomNumber < 0.5 ? 'heads' : 'tails';

        if (guess === result) {
          console.log('You win!');
          score.wins++;
        } else {
          console.log('You lose!');
          score.losses++;
        }
        console.log(score);
        localStorage.setItem('score', JSON.stringify(score));

        alert(`Wins: ${score.wins}, Losses: ${score.losses}`)
      }
    </script>
  </body>
</html>
