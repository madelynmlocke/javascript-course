<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    ">Rock</button>

    <button onclick="
      playGame('paper');
    ">Paper</button>

    <button onclick="
      playGame('scissors');
    ">Scissors</button>

    <button onclick="
      score.wins = 0;
      score.losses = 0;
      score.ties = 0;
      localStorage.removeItem('score');
      updateScoreElement();
    ">Reset Score</button>

    <p class="js-result"></p>
    <p class="js-game"></p>
    <p class="js-score"></p>

    <script>
      let score = JSON.parse(localStorage.getItem('score')) || {
          wins: 0,
          losses:0,
          ties: 0
      };

      updateScoreElement();

      function playGame(playerMove) {
        const move = pickMove(); //save returned value from function's local variable
        let result = '';
      
        if (playerMove === 'scissors') {
          if (move === 'rock') {
            result = 'you lose'; 
          } else if (move === 'paper') {
            result = 'you win';
          } else {
            result = 'tie';
          }

        } else if (playerMove === 'paper') {
          if (move === 'rock') {
            result = 'you win';
          } else if (move === 'paper') {
            result = 'tie';
          } else {
            result = 'you lose';
          }
          
        } else if (playerMove === 'rock') {
          if (move === 'rock') {
            result = 'tie';
          } else if (move === 'paper') {
            result = 'you lose';
          } else {
            result = 'you win';
          }
        }

        if (result === 'you win') {
          score.wins++;
        } else if (result === 'you lose') {
            score.losses++;
        } else if (result === 'tie') {
          score.ties++;
        }
        
        localStorage.setItem('score', JSON.stringify(score));

        updateScoreElement();

        document.querySelector('.js-result').innerHTML = result;
        document.querySelector('.js-game').innerHTML = `you picked ${playerMove}. computer picked ${move}.`;

      }

      function updateScoreElement() {
        document.querySelector('.js-score')
          .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
      }

      function pickMove() {
        const randomNumber = Math.random();
        let move = ''; //local variable 

        if (randomNumber >= 0 && randomNumber < 1/3 ) {
          move = 'rock';
        } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
          move = 'paper';
        } else if (randomNumber >= 2/3 && randomNumber < 1) {
          move = 'scissors'; 
        }
        return move; //return local variable
      }
    </script>
  </body>
</html>
