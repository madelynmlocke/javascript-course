<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="
      playGame('rock');
    ">Rock</button>

    <button onclick="
      playGame('paper');
    ">Paper</button>

    <button onclick="
      playGame('scissors');
    ">Scissors</button>

    <script>
      function playGame(playerMove) {
        const move = pickMove(); //save returned value from function's local variable
        let result = '';
      
        if (playerMove === 'scissors') {
          if (move === 'rock') {
            result = 'you lose';
          } else if (move === 'paper') {
            result = 'you win';
          } else {
            result = 'tie';
          }

        } else if (playerMove === 'paper') {
          if (move === 'rock') {
            result = 'you win';
          } else if (move === 'paper') {
            result = 'tie';
          } else {
            result = 'you lose';
          }
          
        } else if (playerMove === 'rock') {
          if (move === 'rock') {
            result = 'tie';
          } else if (move === 'paper') {
            result = 'you lose';
          } else {
            result = 'you win';
          }
        }

      alert(`you picked ${playerMove}. computer picked ${move}. ${result}`);
      }

      function pickMove() {
        const randomNumber = Math.random();
        let move = ''; //local variable 

        if (randomNumber >= 0 && randomNumber < 1/3 ) {
          move = 'rock';
        } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
          move = 'paper';
        } else if (randomNumber >= 2/3 && randomNumber < 1) {
          move = 'scissors'; 
        }
        return move; //return local variable
      }
    </script>
  </body>
</html>
