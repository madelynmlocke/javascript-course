<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button onclick="
      console.log(`Cart Quantity: ${cartQuantity}`);
      ">Show Quantity</button>
    
    <button onclick="
      (cartQuantity >= maxQuantity) 
      ? alert('Cart is full') 
      : cartQuantity++; 
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">Add to cart</button>
    
    <button onclick="
      (cartQuantity <= 0)
      ? alert('Not enough items in cart')
      : cartQuantity--;
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">Remove from Cart</button>
    
    <button onclick="
      (cartQuantity >= maxQuantity) 
      ? alert('Cart is full') 
      : cartQuantity+=2;
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">+2</button>
    
    <button onclick="
      (cartQuantity >= maxQuantity) 
      ? alert('Cart is full') 
      : cartQuantity +=3;
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">+3</button>
    
    <button onclick="
      cartQuantity = 0;
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">Reset Cart</button>

    <script>
      let cartQuantity = 0;
      const maxQuantity = 10;

    </script>
  </body>
</html>
