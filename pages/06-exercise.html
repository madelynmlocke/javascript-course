<!DOCTYPE html>
<html>
  <head>
    <title>Exercise</title>
  </head>
  <body>
    <script>
      let randomNum = Math.random();
      console.log(randomNum)
      
      let guess = 'heads';

      let result  = (randomNum > 0.5) 
      ? 'heads' : 'tails' ;
      console.log(result);

      (guess === result) 
      ? console.log('You win!')
      : console.log('You lose!');
      

    </script>
  </body>
</html>
