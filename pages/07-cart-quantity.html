<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity</title>
  </head>
  <body>
    <button onclick="
      console.log(`Cart Quantity: ${cartQuantity}`);
      ">Show Quantity</button>
    
    <button onclick="
      updateCartQuantity(1);
    ">Add to cart</button>
    
    <button onclick="
      updateCartQuantity(2);
    ">+2</button>
    
    <button onclick="
      updateCartQuantity(3);
    ">+3</button>

    <button onclick="
      updateCartQuantity(-1);
    ">Remove from Cart</button>
    
    <button onclick="
      cartQuantity = 0;
      console.log(`Cart Quantity: ${cartQuantity}`);
    ">Reset Cart</button>

    <script>
      let cartQuantity = 0;
      const maxQuantity = 10;

      function updateCartQuantity(change) {
        if (cartQuantity + change > maxQuantity) {
          alert('Cart is full');
          return;
        } 
        
        if (cartQuantity + change < 0) {
          alert('Not enough items in cart');
          return;
        }
          cartQuantity += change;
          console.log(`Cart Quantity: ${cartQuantity}`);
      }

    </script>
  </body>
</html>
