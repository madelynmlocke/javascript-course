      function convertLength(length, from, to) {
        if(from === 'km' && to === 'miles') {
          return `${length} ${from} is ${length / 1.6} ${to}`;
        
        } else if (from === 'miles' && to === 'km') {
          return `${length} ${from} is ${length * 1.6} km`;
        
        } else if (from === 'km' && to === 'ft') {
          return `${length} ${from} is ${length * 3281} ${to}`;
        
        } else if (from === 'miles' && to === 'ft') {
          return `${length} ${from} is ${length * 5280} ${to}`;
        
        } else if (from === 'ft' && to === 'km') {
          return `${length} ${from} is ${length / 3281} ${to}`;
        
        } else if (from === 'ft' && to === 'miles') {
            return `${length} ${from} is ${length / 5280} ${to}`;

        } else if (from === to) {
          return `${length} ${to}`;
        }
      }
      console.log(convertLength(50, 'miles', 'km'));
      console.log(convertLength(32, 'km', 'miles'));
      console.log(convertLength(10, 'km', 'ft'));
      console.log(convertLength(10, 'miles', 'ft'));
      console.log(convertLength(8000, 'ft', 'km'));
      console.log(convertLength(8000, 'ft', 'miles'));
      console.log(convertLength(50, 'km', 'km'));
