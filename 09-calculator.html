<!DOCTYPE html>
<html>
  <head>
    <title>Calculator</title>
  </head>
  <body>

    <p></p>
    <button onclick="
      updateCalculation('1');
    ">1</button>
    <button onclick="
      updateCalculation('2');
    ">2</button>
    <button onclick="
      updateCalculation('3');
    ">3</button>
    <button onclick="
      updateCalculation(' + ');
    ">+</button>

    <p></p>
    <button onclick="
      updateCalculation('4');
    ">4</button>

    <button onclick="
      updateCalculation('5');
    ">5</button>

    <button onclick="
      updateCalculation('6');
    ">6</button>

    <button onclick="
      updateCalculation(' - ');
    ">-</button>

    <p></p>
    <button onclick="
      updateCalculation('7');
    ">7</button>

    <button onclick="
      updateCalculation('8');
    ">8</button>

    <button onclick="
      updateCalculation('9');
    ">9</button>

    <button onclick="
      updateCalculation(' * ');
    ">*</button>

    <p></p>
    <button onclick="
      updateCalculation('0');
    ">0</button>

    <button onclick="
      updateCalculation('.');
    ">.</button>

    <button onclick="
      calculation = eval(calculation);
      displayCalculation();
      localStorage.setItem('calculation', calculation); 
    ">=</button>

    <button onclick="
      calculation = '';
      displayCalculation();
      localStorage.setItem('calculation', calculation);
    ">Cl</button>

    <p class="js-message"></p>

    <script>
      let calculation = localStorage.getItem('calculation') || '';
      let message = document.querySelector('.js-message');

      function updateCalculation(value) {
        calculation += value;
        console.log(calculation);
        message.innerHTML = calculation;
      }

      // Optional: you can also create a function in order
      // to reuse this code.
      function saveCalculation() {
        localStorage.setItem('calculation', calculation);
      }

      function displayCalculation() {
        message.innerHTML = calculation;
      }

    </script>
  </body>
</html>
