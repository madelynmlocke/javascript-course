<!DOCTYPE html>
<html>
  <head>
    <title>DOM Projects</title>
  </head>
<body>

  <p>Amazon Shipping Calculator</p>

  <input class="js-cost-input" placeholder="Cost of order" onkeydown="
    handleCostKeyDown(event);
  ">

  <button onclick="
  calculateTotal();
  ">Calculate</button>

  <p class="js-total-cost"></p>

  <input class="js-key-input" placeholder="type something" onkeyup="
    document.querySelector('.js-message').innerHTML = document.querySelector('.js-key-input').value;
  ">
  <p class="js-message"></p>

  <script>
  
    function handleCostKeyDown(event) {
      if (event.key === 'Enter') {
        calculateTotal();
  }
    }

    function calculateTotal() {
      const costInput = document.querySelector('.js-cost-input');
      let cost = Number(costInput.value) * 100;
      console.log(cost);
      if (cost < 4000) {
          cost += 1000;
      }
      document.querySelector('.js-total-cost')
        .innerText = `$${cost / 100}`;
    }

  </script>
</body>
</html>
